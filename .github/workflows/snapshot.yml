name: Build, Test and Publish Snapshot

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # Build and test
  # ---------------------------------------------------------------------------

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml -s .mvn/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars
          path: target/*.jar

  # ---------------------------------------------------------------------------
  # Publish snapshot — only on push to main
  # ---------------------------------------------------------------------------

  publish-snapshot:
    name: Publish Snapshot to GitHub Releases and GitHub Packages
    needs: [ build ]
    if: github.event_name == 'push' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: plugin-jars
          path: snapshot-jars/
      - name: Publish rolling snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete snapshot --yes --cleanup-tag || true
          gh release create snapshot snapshot-jars/*.jar \
            --title "Snapshot Build" \
            --notes "Snapshot from ${{ github.sha }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --prerelease \
            --target ${{ github.sha }}
      - name: Set up Maven for GitHub Packages
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Delete snapshot package from GitHub Packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --method DELETE /user/packages/maven/net.ladenthin.bitcoinaddressfinder || true
      - name: Publish to GitHub Packages
        run: |
          mvn --batch-mode deploy -s .mvn/settings.xml -Dmaven.test.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
