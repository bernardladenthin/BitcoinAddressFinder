name: Publish
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build
        run: mvn --batch-mode -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true -DskipTests -Dmaven.javadoc.skip=true package
      - uses: actions/upload-artifact@v7
        with: { name: jars, path: target/*.jar }
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-surefire
          path: |
            target/surefire-reports/**
            hs_err_pid*.log
          if-no-files-found: ignore

  test:
    name: Test (${{ matrix.os }})
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            disable-lmdb: true
          - os: windows-latest
            disable-lmdb: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn --batch-mode -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=${{ matrix.disable-lmdb }} --update-snapshots test jacoco:report
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire-and-crash-logs-${{ matrix.os }}
          path: |
            target/surefire-reports/**
            hs_err_pid*.log
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  publish-snapshot:
    name: Publish Snapshot to Central
    needs: [test]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Deploy snapshot
        run: mvn --batch-mode -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}

  publish-release:
    name: Publish Release to Central
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy release
        run: mvn --batch-mode -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true -P release deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  post-publish:
    name: Post-Publish
    needs: [test, publish-snapshot, publish-release]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (needs.publish-snapshot.result == 'success' ||
       needs.publish-release.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: ${{ env.JAVA_VERSION }}, distribution: temurin }
      - uses: actions/download-artifact@v8
        with: { name: jacoco-report, path: target/site/jacoco/ }
        continue-on-error: true
      - uses: advanced-security/maven-dependency-submission-action@v5
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.COVERALLS_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco
        continue-on-error: true
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
        continue-on-error: true
