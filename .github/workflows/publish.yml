name: Publish
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a RELEASE to Maven Central. Off by default; the release publish runs only when this is true AND the workflow is run on a v* tag."
        type: boolean
        default: false

permissions:
  contents: read

env:
  JAVA_VERSION: '21'

jobs:
  # ---------------------------------------------------------------------------
  # Start gate — single cancellable abort window before the pipeline starts.
  # The wait duration lives in the `startgate` GitHub Environment (Settings →
  # Environments → startgate → Wait timer).
  # ---------------------------------------------------------------------------
  startgate:
    name: Start gate (abort window)
    runs-on: ubuntu-latest
    environment: startgate
    steps:
      - run: echo "Start gate elapsed — proceeding with pipeline."

  code-style:
    name: Code style (spotless) + package graph
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Spotless check (fail fast on format violations)
        run: mvn -B --no-transfer-progress spotless:check
      - name: Print internal package dependency graph (jdeps, informational)
        continue-on-error: true
        run: |
          mvn -B --no-transfer-progress -DskipTests -Denforcer.skip=true compile
          echo "=== internal package dependency graph (jdeps, bytecode) ==="
          jdeps -verbose:package target/classes | grep 'net.ladenthin.bitcoinaddressfinder' || true

  build:
    name: Build
    needs: startgate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build
        # -Dmaven.javadoc.skip=true is REQUIRED here and is the ONLY surviving javadoc
        # skip across all four sibling repos (do not remove without the full-build check
        # below). This job runs plain `mvn package`, which triggers attach-javadocs at
        # prepare-package. BAF's javadoc is module-aware (<source>21</source> +
        # module-info.java in src/main/java9), so an unguarded run can flip into JPMS
        # module mode and fail ("No source files for package net.ladenthin..."). Javadoc
        # is validated deliberately via `-P release` in the publish jobs. The Java-8
        # sibling repos (java-llama.cpp / streambuffer / llamacpp-ai-index, <source>8>)
        # are immune (classpath mode regardless) and carry no such flag. To drop this,
        # first prove `mvn package` builds javadoc clean (a standalone `mvn javadoc:jar`
        # cannot — it always runs classpath mode and hides the trap). See CLAUDE.md
        # "Verifying Javadoc locally" and workspace/crossrepostatus.md.
        run: mvn --batch-mode --no-transfer-progress -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true -DskipTests -Dmaven.javadoc.skip=true package
      - uses: actions/upload-artifact@v7
        with: { name: jars, path: target/*.jar }
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-surefire
          path: |
            target/surefire-reports/**
            hs_err_pid*.log
          if-no-files-found: ignore

  test:
    name: Test (${{ matrix.os }})
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            disable-lmdb: true
          - os: windows-latest
            disable-lmdb: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Memory before tests
        if: runner.os == 'Linux'
        run: free -h
      - name: Test
        shell: bash
        run: mvn -e --batch-mode --no-transfer-progress -P jcstress -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=${{ matrix.disable-lmdb }} --update-snapshots test jacoco:report
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire-and-crash-logs-${{ matrix.os }}
          path: |
            target/surefire-reports/**
            hs_err_pid*.log
            *.hprof
      - name: Memory after tests
        if: always() && runner.os == 'Linux'
        run: free -h
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: ignore
      - name: Run PIT mutation tests
        if: matrix.os == 'ubuntu-latest'
        run: mvn --batch-mode --no-transfer-progress -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true test-compile org.pitest:pitest-maven:mutationCoverage
      - name: Extract PIT survivors
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          echo "=== PIT Survived Mutations ==="
          for html_file in $(find target/pit-reports -name "*.html" -type f 2>/dev/null | sort); do
            if grep -q "SURVIVED" "$html_file"; then
              echo "Found survivors in $html_file:"
              grep -B 2 -A 3 "SURVIVED" "$html_file"
              echo ""
            fi
          done
      - uses: actions/upload-artifact@v7
        if: always() && matrix.os == 'ubuntu-latest'
        with: { name: pit-reports, path: target/pit-reports/ }

  # ---------------------------------------------------------------------------
  # vmlens interleaving analysis — pure-Java, needs no LMDB or OpenCL device.
  # Staged to a single smoke test for now (see the `vmlens` profile in pom.xml).
  # ---------------------------------------------------------------------------
  vmlens:
    name: Test (vmlens interleavings)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Test under vmlens (interleaving analysis)
        # Add each new test in the `vmlens` package to this -Dtest list (surefire
        # -Dtest matches simple class names, not package globs; the default suite is
        # excluded from the vmlens package via pom.xml managed surefire <excludes>).
        run: >-
          mvn --batch-mode --no-transfer-progress -Pvmlens test
          -Dtest=VmlensInterleavingSmokeTest,KeyProducerQueueBufferedInterleavingTest
          -DfailIfNoTests=false
          -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vmlens-report
          path: target/vmlens-report/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Emulated-OpenCL coverage on a real CPU OpenCL device (pocl), kept separate
  # from the `test` matrix above. This is a REQUIRED gate — both Ubuntu pipelines
  # (the CPU-only `test` matrix where @OpenCLTest self-skips, and this emulated
  # OpenCL run) must stay green.
  #
  # Why a separate job rather than adding pocl to the `test` matrix:
  #   * The main matrix stays exactly as before — no OpenCL ICD installed there,
  #     so the @OpenCLTest suite self-skips via OpenCLPlatformAssume and those
  #     jobs remain green. The existing config is untouched.
  #   * pocl is a conformant OpenCL 3.0 CPU implementation; its device clears
  #     BAF's `CL_DEVICE_VERSION >= 2.0` gate, so here the @OpenCLTest suite
  #     actually executes (real kernel compile + run on a CPU device).
  #
  # Coverage note:
  #   This job runs the FULL test suite (not just @OpenCLTest) and generates the
  #   JaCoCo report that is sent to Coveralls / Codecov. The `test` ubuntu matrix
  #   above also generates a jacoco-report artifact but that one skips all
  #   @OpenCLTest classes (no ICD installed), so it would show 0% for the entire
  #   OpenCL pipeline. Using the pocl run as the coverage source gives meaningful
  #   numbers for OpenCLContext, OpenClTask, OpenCLGridResult, ProducerOpenCL, etc.
  #   LMDB tests are still disabled here (native lib unavailable on GitHub runners);
  #   Windows coverage (LMDB-enabled) is not merged — acceptable trade-off.
  #
  # Reliability notes (why this is now safe to gate on):
  #   * The secp256k1 kernel's zero-scalar out-of-bounds read in `point_mul_xy`
  #     (which a CPU device traps as SIGSEGV while GPUs mask it) is fixed by an
  #     in-kernel guard.
  #   * ProbeAddressesOpenCLTest's grid-size sweep is device-aware: on a CPU-only
  #     device it caps the grid via OpenCLPlatformAssume (default 2^4) so the run
  #     stays within the per-fork test timeout; a GPU still runs the full sweep.
  #     Override with
  #     -Dnet.ladenthin.bitcoinaddressfinder.test.opencl.cpu.maxGridBits=N.
  # The hs_err / dumpstream are echoed on failure for diagnosis.
  # ---------------------------------------------------------------------------
  test-opencl:
    name: Test OpenCL (pocl CPU)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Install pocl (CPU OpenCL 3.0 ICD)
        run: |
          sudo apt-get update
          sudo apt-get install -y pocl-opencl-icd ocl-icd-libopencl1 clinfo
          # Log the platform/device + CL_DEVICE_VERSION for the build record.
          clinfo || true
      # Capture the runner's memory + process/thread limits BEFORE the test run. A
      # "Error occurred in starting fork" failure with no hs_err and no surefire dumpstream
      # is an OS-level spawn failure (ENOMEM / EAGAIN), not a test timeout — these numbers
      # plus `mvn -e` (which prints the underlying IOException errno) make it diagnosable.
      - name: Runner resource snapshot (pre-test)
        shell: bash
        run: |
          echo "===== free -m ====="; free -m || true
          echo "===== nproc ====="; nproc || true
          echo "===== ulimit -a ====="; ulimit -a || true
          echo "===== vm.max_map_count ====="; cat /proc/sys/vm/max_map_count || true
          echo "===== vm.overcommit_memory ====="; cat /proc/sys/vm/overcommit_memory || true
      - name: All tests including OpenCL (pocl) + JaCoCo coverage
        shell: bash
        run: mvn -e --batch-mode --no-transfer-progress -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true --update-snapshots test jacoco:report
      - uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-opencl
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: warn
      # A forked test JVM that aborts (the known pocl SIGSEGV in the secp256k1
      # kernel) leaves an hs_err_pid log + a surefire dumpstream that are
      # otherwise only inside the uploaded artifact. Echo them into the job log
      # on failure so the native frame is readable directly.
      - name: Dump native crash logs (on failure)
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "===== free -m (post-failure) ====="; free -m || true
          echo "===== thread/process count (post-failure) ====="; ps -eL 2>/dev/null | wc -l || true
          echo "===== hs_err_pid*.log ====="
          for f in hs_err_pid*.log; do [ -e "$f" ] && { echo "----- $f -----"; cat "$f"; }; done
          echo "===== surefire dumpstream / dump ====="
          for f in target/surefire-reports/*.dumpstream target/surefire-reports/*.dump; do [ -e "$f" ] && { echo "----- $f -----"; cat "$f"; }; done
          echo "===== OpenCL surefire reports ====="
          for f in target/surefire-reports/*OpenCL*.txt; do [ -e "$f" ] && { echo "----- $f -----"; cat "$f"; }; done
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire-and-crash-logs-opencl
          path: |
            target/surefire-reports/**
            hs_err_pid*.log
            *.hprof
          if-no-files-found: ignore

  report:
    name: Report
    needs: [test, test-opencl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      # Prefer coverage from the pocl job: it runs ALL tests including @OpenCLTest
      # (the ubuntu `test` matrix skips those because no ICD is installed there,
      # so its jacoco-report shows 0% for the entire OpenCL pipeline).
      - uses: actions/download-artifact@v8
        with: { name: jacoco-report-opencl, path: target/site/jacoco/ }
        continue-on-error: true
      - uses: advanced-security/maven-dependency-submission-action@v5
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco
        continue-on-error: true
      - name: Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
        continue-on-error: true

  check-snapshot:
    name: "Check: main branch / SNAPSHOT"
    needs: [report]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Confirm snapshot ref
        run: echo "Confirmed on snapshot ref ${{ github.ref }}"

  check-tag:
    name: "Check: v* tag"
    needs: [report]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Confirm tag ref
        run: echo "Confirmed on tag ${{ github.ref }}"

  publish-snapshot:
    name: Publish Snapshot to Central
    needs: [check-snapshot, code-style]
    if: needs.check-snapshot.result == 'success'
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy snapshot
        run: mvn --batch-mode --no-transfer-progress -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true -P release deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Collect signed artifacts
        run: |
          mkdir -p signed-snapshot-assets
          cp target/*.jar signed-snapshot-assets/ 2>/dev/null || true
          cp target/*.jar.asc signed-snapshot-assets/ 2>/dev/null || true
      - uses: actions/upload-artifact@v7
        with:
          name: signed-snapshot-assets
          path: signed-snapshot-assets/

  github-snapshot:
    name: Update Snapshot Pre-release on GitHub
    needs: [publish-snapshot]
    if: needs.publish-snapshot.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: signed-snapshot-assets
          path: snapshot-assets/
      - name: Update snapshot pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view snapshot --repo ${{ github.repository }} 2>/dev/null \
            || gh release create snapshot \
                 --repo ${{ github.repository }} \
                 --prerelease \
                 --title "Snapshot (latest)" \
                 --notes "Latest snapshot build from the main branch."
          gh release upload snapshot snapshot-assets/* \
            --repo ${{ github.repository }} \
            --clobber

  publish-release:
    name: Publish Release to Central
    needs: [check-tag, code-style]
    if: needs.check-tag.result == 'success' && inputs.publish_release
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy release
        run: mvn --batch-mode --no-transfer-progress -Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=true -P release deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Collect signed artifacts
        run: |
          mkdir -p signed-release-assets
          cp target/*.jar signed-release-assets/ 2>/dev/null || true
          cp target/*.jar.asc signed-release-assets/ 2>/dev/null || true
      - uses: actions/upload-artifact@v7
        with:
          name: signed-release-assets
          path: signed-release-assets/

  github-release:
    name: Attach Binaries to GitHub Release
    needs: [publish-release]
    if: needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: signed-release-assets
          path: release-assets/
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
