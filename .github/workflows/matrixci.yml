name: matrix CI

on:
  push:
    branches:
      - main
      - 'releases/*'
  pull_request:
    branches:
      - '*'

jobs:
  build:

    strategy:
      # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstrategyfail-fast
      fail-fast: false
      # https://docs.github.com/en/actions/using-jobs/using-a-matrix-for-your-jobs
      matrix:
        # https://github.com/actions/setup-java#supported-distributions
        javaversion: [ '21' ]
        javadistribution: ['adopt', 'adopt-openj9', 'corretto', 'dragonwell', 'liberica', 'microsoft', 'temurin', 'zulu'] # internally 'adopt-hotspot' is the same as 'adopt'
        # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
        os: [macos-latest, ubuntu-latest, windows-latest]
        exclude:
          # On macOS and Windows only temurin is tested for OS-specific behaviour;
          # full JVM distribution coverage is provided by the ubuntu-latest leg.
          - javadistribution: 'adopt'
            os: 'macos-latest'
          - javadistribution: 'adopt-openj9'
            os: 'macos-latest'
          - javadistribution: 'corretto'
            os: 'macos-latest'
          - javadistribution: 'dragonwell'
            os: 'macos-latest'
          - javadistribution: 'liberica'
            os: 'macos-latest'
          - javadistribution: 'microsoft'
            os: 'macos-latest'
          - javadistribution: 'zulu'
            os: 'macos-latest'
          - javadistribution: 'adopt'
            os: 'windows-latest'
          - javadistribution: 'adopt-openj9'
            os: 'windows-latest'
          - javadistribution: 'corretto'
            os: 'windows-latest'
          - javadistribution: 'dragonwell'
            os: 'windows-latest'
          - javadistribution: 'liberica'
            os: 'windows-latest'
          - javadistribution: 'microsoft'
            os: 'windows-latest'
          - javadistribution: 'zulu'
            os: 'windows-latest'

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK ${{ matrix.javaversion }} ${{ matrix.javadistribution }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.javaversion }}
        distribution: ${{ matrix.javadistribution }}
        cache: maven
    - name: Build with Maven
      run: mvn -B --no-transfer-progress "-Dnet.ladenthin.bitcoinaddressfinder.disableLMDBTest=false" test --file pom.xml
    - name: Upload Surefire Reports and JVM Crash Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ matrix.os }}-${{ matrix.javadistribution }}-java${{ matrix.javaversion }}
        path: |
            target/surefire-reports/**
            hs_err_pid*.log
